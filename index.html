<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AceUp</title>
    <link rel="stylesheet" href="Style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <div id="navbar">
            <div id="logo"></div>
            <h1>Ace-Up</h1>
            <div id="con">
                <div id="filters" class="nav">
                    <button>
                        <i class="fa-solid fa-filter"></i>
                        Filters
                    </button>
                </div>
                <div id="support" class="nav">
                    <button>
                        <i class="fa-solid fa-headset"></i>
                        Support
                    </button>
                </div>
                <div id="profile" class="nav">
                    <button>
                        <i class="fa-solid fa-user"></i>
                        Sign-Up
                    </button>
                </div>
            </div>
        </div>

    </header>
    <main>
        <div id="sec-con">
            <div id="shop">
                <div id="cart" class="cem">
                    <button>
                        <i class="fa-solid fa-cart-plus"></i>
                        Cart
                    </button>
                </div>
                <div id="wishlist" class="cem">
                    <button>
                        <i class="fa-solid fa-list"></i>
                        Wishlist
                    </button>
                </div>
                <div id="gvault" class="cem">
                    <button>
                        <i class="fa-solid fa-gamepad"></i>
                        G-vault
                    </button>
                </div>
            </div>
            <div id="main-content">
                <div id="block1">
                    <div id="game-display">Display of g1 g2 g3 g4 g5 one by one</div>
                    <div id="top-games">
                        <div id="game1" class="g">Game-1</div>
                        <div id="game2" class="g">Game-2</div>
                        <div id="game3" class="g">Game-3</div>
                        <div id="game4" class="g">Game-4</div>
                        <div id="game5" class="g">Game-5</div>
                    </div>
                </div>
                <div id="row1">
                    <div class="gg"></div>
                    <div class="gg"></div>
                    <div class="gg"></div>
                    <div class="gg"></div>
                    <div class="gg"></div>
                    <div class="gg"></div>
                    <div class="gg"></div>
                    <div class="gg"></div>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
