<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AceUp</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <header>
      <div id="navbar">
        <div id="logo"></div>
        <h1>Ace-Up</h1>
        <div id="con">
          <div id="filters" class="nav">
            <button>
              <i class="fa-solid fa-filter"></i>
              Filters
            </button>
          </div>
          <div id="profile" class="nav">
            <button>
              <i class="fa-solid fa-user"></i>
              Sign-Up
            </button>
          </div>
        </div>
      </div>
    </header>
    <main>
      <div id="sec-con">
        <div id="shop">
          <div id="cart" class="cem">
            <a href=""> <i class="fa-solid fa-cart-plus"></i> Cart</a>
          </div>
          <div id="wishlist" class="cem">
            <a href=""> <i class="fa-solid fa-list"></i> Wishlist</a>
          </div>
          <div id="gvault" class="cem">
            <a href=""><i class="fa-solid fa-gamepad"></i> G-vault</a>
          </div>
          <div id="helpline" class="cem">
            <a href=""><i class="fa-solid fa-phone"></i> Helpline</a>
          </div>
        </div>
        <div id="main-content">
          <div id="block1">
            <div id="game-display">
              <h3>Valorant</h3>
              <p>Play for free</p>
            </div>
            <div id="top-games">
              <div id="game1" class="g">
                <div class="ban">
                  <img src="Images//Valorant banner.jpg" alt="Valorant" />
                </div>
                Valorant
              </div>
              <div id="game2" class="g">
                <div class="ban">
                  <img src="Images/FS25 banner.jpg" alt="FS25" />
                </div>
                Farm Simulator 25
              </div>
              <div id="game3" class="g">
                <div class="ban">
                  <img src="Images/COD MW 3 banner.jpg" alt="COD MW 3" />
                </div>
                COD mordern warfare 3
              </div>
              <div id="game4" class="g">
                <div class="ban">
                  <img src="Images/PUBG banner.jpg" alt="PUBG" />
                </div>
                PUBG
              </div>
              <div id="game5" class="g">
                <div class="ban">
                  <img src="Images/Gran Turismo 7 banner.jpg" alt="FS25" />
                </div>
                Gran Turismo 7
              </div>
            </div>
          </div>
          <div id="row1">
            <div class="gg"></div>
            <div class="gg"></div>
            <div class="gg"></div>
            <div class="gg"></div>
            <div class="gg"></div>
            <div class="gg"></div>
            <div class="gg"></div>
            <div class="gg"></div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
