<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHorizon Logo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0a0a0a;
        }

        .logo {
            display: flex;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            color: #00c3ff; /* Neon blue color */
            background: linear-gradient(90deg, #ff0080, #2cb13a);
            background-clip: text;
            -webkit-text-fill-color: transparent;
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(41, 222, 44, 0.8);
            text-transform: uppercase;
        }

        .logo img {
            width: 50px;
            height: 50px;
            margin-right: 15px;
            filter: drop-shadow(0px 0px 5px #2cb13a);
        }
    </style>
</head>
<body>
    <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/128/3512/3512765.png" alt="Game Controller">
        GameHorizon
    </div>
</body>
</html>
